spring.application.name=terrasense

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.br.com.TerraSense=DEBUG
logging.level.org.springdoc=DEBUG

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

springdoc.info.title=TerraSense API
springdoc.info.description=API REST para monitoramento agrícola com dados IoT, satélite e alertas.
springdoc.info.version=v1.0.0

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.try-it-out-enabled=true